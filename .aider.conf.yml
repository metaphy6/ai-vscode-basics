# Aider configuration.
#
# The single most important setting: auto-commits OFF. This repo's commit
# policy lives in AGENTS.md §2 — agents (including Aider) never call
# `git commit` or `git push`; they append a row to docs/tracking/tracking.csv
# and stage files; the human runs `make git`.

auto-commits: false
dirty-commits: false
attribute-author: false
attribute-committer: false

# Read CONVENTIONS.md as Aider's repo brief; it delegates to AGENTS.md.
read:
  - CONVENTIONS.md
  - AGENTS.md
  - .agents/skills/README.md

# Prefer the cheapest model that works — see AGENTS.md and
# docs/guides/MODEL_PROFILES.md for the rationale.
# model: claude-3-5-sonnet-20241022  # uncomment + edit to pin a model
